<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SecureStock - Usuarios</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="barra-nav" id="barra-nav"></header>

  <main class="contenedor">
    <h1>Gestión de cuentas de usuario</h1>
    <p id="mensaje" class="mensaje oculto"></p>

    <div class="tarjeta">
      <h2>Registrar nuevo usuario</h2>
      <form id="form-usuario">
        <div class="fila-formulario">
          <div>
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" required>
          </div>
          <div>
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" required autocomplete="off">
          </div>
        </div>
        <div class="fila-formulario">
          <div>
            <label for="password">Contraseña temporal</label>
            <input type="password" id="password" minlength="6" required autocomplete="new-password">
          </div>
          <div>
            <label for="rol">Rol</label>
            <select id="rol" required>
              <option value="operario">Operario</option>
              <option value="supervisor">Supervisor</option>
              <option value="administrador">Administrador</option>
            </select>
          </div>
        </div>
        <button type="submit" class="boton">Crear usuario</button>
      </form>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
