<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SecureStock - Recuperar contraseña</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="pantalla-auth">
    <div class="tarjeta">
      <h1>Recuperar contraseña</h1>
      <p id="mensaje" class="mensaje oculto"></p>
      <form id="form-recuperar">
        <div>
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required autocomplete="username">
        </div>
        <button type="submit" class="boton">Enviar enlace de recuperación</button>
      </form>
      <p class="enlaces-auth">
        <a href="index.html">Volver a iniciar sesión</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/recuperar.js"></script>
</body>
</html>
